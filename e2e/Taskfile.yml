version: "3"

# Глобальные переменные проекта
vars:
  GO_VERSION: "1.26"

  PROTOC_GEN_GO_VERSION: "v1.36.11"
  PROTOC_GEN_GO_GRPC_VERSION: "v1.6.2"

  BIN_DIR: "{{.ROOT_DIR}}/bin"
  PROTOC_GEN_GO: "{{.BIN_DIR}}/protoc-gen-go"
  PROTOC_GEN_GO_GRPC: "{{.BIN_DIR}}/protoc-gen-go-grpc"

tasks:
  install-protoc-plagin:
    desc: "Установить файлы для генерации proto-файлов в ./bin"
    cmds:
      - |
        [ -f {{.PROTOC_GEN_GO}} ] || {
          echo 'Устанавливаем protoc-gen-go {{.PROTOC_GEN_GO_VERSION}}...'
          GOBIN={{.BIN_DIR}} go install google.golang.org/protobuf/cmd/protoc-gen-go@{{.PROTOC_GEN_GO_VERSION}}
        }
        [ -f {{.PROTOC_GEN_GO_GRPC}} ] || {
          echo 'Устанавливаем protoc-gen-go-grpc {{.PROTOC_GEN_GO_GRPC_VERSION}}...'
          GOBIN={{.BIN_DIR}} go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@{{.PROTOC_GEN_GO_GRPC_VERSION}}
        }
    status:
      - test -x {{.PROTOC_GEN_GO}}
      - test -x {{.PROTOC_GEN_GO_GRPC}}

  api-gen:
    desc: "Генирация кода сервиса из proto файла"
    deps: [install-protoc-plagin]
    cmds:
      - |
        protoc \
          --plugin=protoc-gen-go=./bin/protoc-gen-go \
          --plugin=protoc-gen-go-grpc=./bin/protoc-gen-go-grpc \
          --go_out=. --go_opt=paths=source_relative \
          --go-grpc_out=. --go-grpc_opt=paths=source_relative \
              api/api.proto
